name: CI – Docker

on:
  workflow_call:
    inputs:
      image-name:
        description: 'Docker image name (e.g. ghcr.io/org/app)'
        type: string
        required: true
      registry:
        description: 'Container registry hostname (e.g. ghcr.io). Required when push is true.'
        type: string
        default: 'ghcr.io'
      dockerfile:
        description: 'Path to the Dockerfile'
        type: string
        default: 'Dockerfile'
      context:
        description: 'Build context path'
        type: string
        default: '.'
      push:
        description: 'Whether to push the image to the registry'
        type: boolean
        default: false
      platforms:
        description: 'Target platforms (e.g. linux/amd64,linux/arm64)'
        type: string
        default: 'linux/amd64'
    secrets:
      registry-username:
        description: 'Registry username. Must be provided when push is true.'
        required: false
      registry-password:
        description: 'Registry password or token. Must be provided when push is true.'
        required: false

jobs:
  docker:
    name: Build Docker image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        if: inputs.platforms != 'linux/amd64'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        if: inputs.push
        uses: docker/login-action@v3
        with:
          registry: ${{ inputs.registry }}
          username: ${{ secrets.registry-username }}
          password: ${{ secrets.registry-password }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ inputs.image-name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          platforms: ${{ inputs.platforms }}
          push: ${{ inputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
