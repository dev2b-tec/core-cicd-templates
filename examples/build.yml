# Cole este arquivo no repo filho em: .github/workflows/build.yml

name: Build & Deploy

on:
  push:
    branches:
      - main

jobs:
  build:
    uses: dev2b-tec/core-cicd-templates/.github/workflows/docker-build.yml@main
    with:
      app_name: minha-aplicacao   # mesmo nome do Dockerfile (ex: Dockerfile.minha-aplicacao)
    secrets:
      DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}

  deploy:
    needs: build
    uses: dev2b-tec/core-cicd-templates/.github/workflows/docker-deploy.yml@main
    with:
      app_name: minha-aplicacao
      deploy_path: /opt/apps/minha-aplicacao
      # compose_service: api   # opcional — se o serviço tiver nome diferente do app_name
    secrets:
      DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
      VPS_PORT: ${{ secrets.VPS_PORT }}
